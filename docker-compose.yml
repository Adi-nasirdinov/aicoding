services:
  db:
    image: postgres:17-alpine
    container_name: promptshop-db
    environment:
      POSTGRES_DB: promptshop
      POSTGRES_USER: promptshop
      POSTGRES_PASSWORD: promptshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: promptshop-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: promptshop
      DB_USERNAME: promptshop
      DB_PASSWORD: promptshop
      JWT_SECRET: promptshop-super-secret-key-change-this-in-real-project-1234567890
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:4173,http://localhost:8080
      SEED_ENABLED: true
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: promptshop-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
