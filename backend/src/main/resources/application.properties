spring.application.name=promptshop-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:promptshop}
spring.datasource.username=${DB_USERNAME:promptshop}
spring.datasource.password=${DB_PASSWORD:promptshop}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${JWT_SECRET:promptshop-super-secret-key-change-this-in-real-project-1234567890}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:720}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:8080}
app.seed.enabled=${SEED_ENABLED:true}
app.seed.admin-email=${SEED_ADMIN_EMAIL:admin@promptshop.dev}
app.seed.admin-password=${SEED_ADMIN_PASSWORD:Admin123!}
app.seed.customer-email=${SEED_CUSTOMER_EMAIL:customer@promptshop.dev}
app.seed.customer-password=${SEED_CUSTOMER_PASSWORD:Customer123!}
